const TR = { en: {
1:{t:"Display text on screen",g:"Learn how to display a text message on the micro:bit's 25-LED screen. You'll discover your first coding block: 'show string'.",tip:"Start with a short word like 'HELLO' or your name. The text scrolls letter by letter across the screen. Try different words and watch the speed!",n:["micro:bit","USB Cable","MakeCode editor"],b:["On start → Show string \"Hello\""],c:["Change the text to your name — does it all fit?","Add a heart icon after the text with <code>basic.showIcon(IconNames.Heart)</code>"]},
2:{t:"Scroll text in a loop",g:"Make a message scroll endlessly on the screen in an infinite loop. You'll learn about the 'forever' block and why pauses matter.",tip:"Without a pause, the text restarts immediately! Add a pause after the text to make it readable. Try values from 100 (very fast) to 600 (slow).",n:["micro:bit","MakeCode editor"],b:["Forever → Show string \"HELLO\"","Pause 200 ms (optional)"],c:["Change the pause: try <code>100</code>, <code>300</code>, <code>600</code> ms — which feels best?","Scroll 2 different messages alternating"]},
3:{t:"Show an icon",g:"Display a built-in icon (small picture) on the LED screen. You'll discover the icon library built into MakeCode.",tip:"Icons are in the 'Basic' menu. There are 40+ built-in icons: Heart, Happy face, House, Duck… Try several!",n:["micro:bit","MakeCode editor"],b:["On start → Show icon (Heart)"],c:["Change the icon: try <code>IconNames.House</code>, <code>IconNames.Happy</code>, <code>IconNames.Duck</code>","Show 2 different icons alternating with a pause between them"]},
4:{t:"Design your own icon",g:"Draw your own custom icon on the 5x5 LED grid. You'll learn to control each LED individually.",tip:"Each dot (#) = LED on, each dot (.) = LED off. Start with a simple letter like your initial or a basic geometric shape.",n:["micro:bit","MakeCode editor"],b:["On start → Show LEDs (draw your 5×5 pattern)"],c:["Draw the first letter of your name — can you read it?","Make 2 drawings alternate with a pause to create a simple animation"]},
5:{t:"Blink an icon",g:"Make an icon blink like an alarm or heartbeat. You'll learn the 'show → pause → clear → pause' pattern — the basis of all animation.",tip:"Blinking = show the icon → wait → clear the screen → wait → repeat. Change the pause duration to speed up or slow down the blink!",n:["micro:bit","MakeCode editor"],b:["Forever → Show icon (Heart)","Pause 300 ms","Clear screen","Pause 300 ms"],c:["Try <code>100</code> ms (fast blink) then <code>800</code> ms (slow blink) — which looks better?","Alternate between 2 different icons instead of blinking (e.g.: big heart → small heart)"]},
6:{t:"Use buttons A and B",g:"Learn to link different actions to each button. The micro:bit has 2 buttons (A left, B right) and you can press both together (A+B).",tip:"You have 3 events: button A alone, button B alone, and A+B together. You can show text, icons, or play sounds on each press!",n:["micro:bit","MakeCode editor"],b:["On button A → Show \"A\"","On button B → Show \"B\"","A+B → Show icon Heart"],c:["Make A = happy face 😀 and B = sad face 😢 using icons","Add a counter: A = +1 to counter, B = show the current total"]},
7:{t:"Shake the board",g:"Trigger an action when you shake the micro:bit! You'll use the built-in accelerometer that detects motion automatically.",tip:"In the simulator on computer, click the SHAKE button to test. On the real board, shake it with medium force.",n:["micro:bit","MakeCode editor"],b:["On shake → Show icon Flash","Pause 500 ms","Clear screen"],c:["Change the icon to match your mood — pick an energetic one!","Add a sound with the icon using <code>music.playTone(440, 200)</code>"]},
8:{t:"Touch-sensitive logo V2",g:"Discover the gold logo at the top of micro:bit V2 — it's a magic touch button! Touch it to play a melody.",tip:"The gold logo is touch-sensitive (V2 only). Gently place your finger on it — no need to press hard.",n:["micro:bit V2","MakeCode editor"],b:["On logo pressed → Play melody"],c:["Try different melodies: <code>Melodies.Birthday</code>, <code>Melodies.Entertainer</code> — which is your favorite?","Add a music note icon display while playing"]},
9:{t:"Sound-triggered action V2",g:"Make the micro:bit react to surrounding sounds! Clap your hands and watch it respond. You'll learn about the sound sensor and thresholds.",tip:"Start with threshold 120. If too sensitive, raise to 200. If not responsive, lower to 80. Sound level ranges from 0 (silence) to 255 (very loud).",n:["micro:bit V2","MakeCode editor"],b:["Forever → If sound level > THRESHOLD → 😀 else 😴"],c:["Change threshold: <code>80</code> (sensitive) or <code>200</code> (needs loud sound) — what's the difference?","Show the exact sound level number with <code>basic.showNumber()</code> to understand the values"]},
10:{t:"Roll the dice",g:"Create an electronic die that shows a random number (1-6) each time you shake the board! You'll learn about random numbers and variables.",tip:"The function <code>randint(1, 6)</code> picks a random number between 1 and 6 — just like rolling a real die! Random is in the Math menu.",n:["micro:bit","MakeCode editor"],b:["On shake → ROLL = random 1 to 6","Show number ROLL"],c:["Change the range: <code>randint(1, 20)</code> for RPG dice","Add a celebration sound when you roll a 6!","Advanced: show a dice face in LEDs instead of a number"]},
11:{t:"Rock-paper-scissors",g:"Play rock-paper-scissors with a friend! Each player shakes their board for a random symbol. You'll learn about if/else conditions.",tip:"The idea: pick a random number 0, 1, or 2, then use 'if' conditions to show the right symbol. 0=rock, 1=scissors, 2=paper.",n:["micro:bit","MakeCode editor"],b:["On shake → N = random 0..2","If N=0 → Rock","If N=1 → Scissors","Else → Paper"],c:["Add a different sound for each choice — a sharp sound for scissors!","Advanced: add a win counter between 2 players using radio"]},
12:{t:"Digital thermometer",g:"Turn your micro:bit into a thermometer! Display the temperature measured by the internal processor (approximate, not 100% accurate).",tip:"Press button A to read the temperature — better than continuous display which is hard to read. The measured temperature is the processor's temperature, not the exact room temperature.",n:["micro:bit","MakeCode editor"],b:["Button A → Show number Temperature (°C)"],c:["Compare indoors vs outdoors — is there a big difference?","Add a sun icon if T > 25, snowflake if T < 10"]},
13:{t:"Build a digital compass",g:"Turn your micro:bit into a compass showing the 4 cardinal directions! You'll learn to use the magnetometer (compass sensor) and multiple if/else conditions.",tip:"First time using the compass? You'll need to calibrate it: tilt the board to fill the LED screen with dots. Angle: 0°=North, 90°=East, 180°=South, 270°=West.",n:["micro:bit","MakeCode editor"],b:["Button A → Calibrate","Forever → DIR = compass heading (°)","Show N/E/S/W based on angle"],c:["Turn slowly on the spot and watch the letter change","Challenge: add 8 directions (NE, NW, SE, SW) instead of 4"]},
14:{t:"Emotion detector",g:"Read an electrical value from pin P0 and display an emotion face. A fun experiment to understand analog reading!",tip:"This is a game, not a scientific measurement! Touch pin P0 and GND with your fingers — your skin resistance produces a changing electrical value.",n:["micro:bit","Wires / croc clips","MakeCode editor"],b:["Forever → V = analog read P0","If V > 500 → 😀 else 😐"],c:["Touch P0 and GND with your fingers — does the face change?","Add 3 emotion levels with different thresholds: 😢 < 300 < 😐 < 600 < 😀"]},
15:{t:"Build a pedometer",g:"Build a step counter (pedometer) using the accelerometer! You'll learn about number variables and how to modify them.",tip:"Every shake = one step! Button A shows the current count, button B resets to zero. Attach the board to your ankle or pocket for real testing.",n:["micro:bit","MakeCode editor"],b:["On start → STEPS = 0","On shake → STEPS += 1","Button A → Show STEPS","Button B → STEPS = 0"],c:["Attach the board to your ankle and walk 20 steps — is the count accurate?","Add a goal: show a celebration when STEPS > 100"]},
16:{t:"Measure light level",g:"Use the LED screen as a light sensor! Read the light level (0 = dark, 255 = bright) and display it as a bar graph.",tip:"Surprise: the LED screen isn't just for display — it can measure light too! Cover the screen with your hand and watch the value drop.",n:["micro:bit","MakeCode editor"],b:["Button A → Show number Light level","Forever → Plot bar graph"],c:["Go near a window then to a dark corner — how big is the difference?","Add a smart threshold: if light < 50, turn all LEDs on as a flashlight"]},
17:{t:"Radio communication",g:"Send and receive messages between 2 micro:bits via radio! You'll learn collaborative programming between two devices.",tip:"Golden rule: both boards must be on the same radio group (e.g.: group 7). Each team should pick a different number!",n:["2× micro:bit","MakeCode editor"],b:["On start → Radio set group 7","Button A → Send 1","Button B → Send 2","On received → if 1 → 😀, if 2 → 😢"],c:["Test with 2 boards in the same room, then further apart — what's the maximum range?","Send text instead of numbers with <code>radio.sendString(\"hello\")</code>"]},
18:{t:"Build a countdown timer",g:"Build a countdown timer! Button A adds time second by second, button B starts the countdown with a sound at the end.",tip:"A sets the time (press multiple times), B starts the countdown. When it reaches 0, it shows 'OK' with a sound! Use it for cooking challenges or games.",n:["micro:bit","MakeCode editor"],b:["On start → T = 0","Button A → T += 1 → Show T","Button B → Countdown from T to 0 → \"OK\" + sound"],c:["Use it for a fun challenge: 10 seconds to tidy your desk!","Add a beep every second during the countdown"]},
19:{t:"Built-in speaker V2",g:"Discover the built-in speaker on micro:bit V2! Play built-in melodies or create your own tunes.",tip:"Start in a quiet place to hear the speaker clearly. It's small but clear. There are 20+ built-in melodies!",n:["micro:bit V2","MakeCode editor"],b:["Button A → Play melody Dadadadum"],c:["Create a custom 3-note jingle with <code>music.playTone(262, 500)</code> (middle C)","Add button B to stop the music instantly"]},
20:{t:"Target number game",g:"A speed game: press B at the right moment when the target number appears! You'll learn to compare variables.",tip:"Button A shows a random number (0-9). If it matches your target (e.g. 5), press B fast! Set your target and challenge your friends.",n:["micro:bit","MakeCode editor"],b:["Button A → N = random 0..9 → Show","Button B → If N==5 → 😀 else 😢"],c:["Change the target from <code>5</code> to another number — try 0 or 9","Add a score counter: +1 for each correct answer"]},
21:{t:"Sprite dodge game",g:"Build a mini video game! Dodge obstacles falling from the top of the screen. Introduction to sprites (animated objects) and collision detection.",tip:"Prerequisites: activities 6 (buttons) and 10 (random). A sprite = a moving LED dot. Build step by step: first the player, then the obstacle, then collision detection.",n:["micro:bit","MakeCode editor"],b:["On start → Player at X=2, Y=4, SCORE=0","Button A/B → move player left/right","Forever → obstacle falls → collision = game over"],c:["Speed up the falling when score increases — progressively harder!","Advanced: add multiple obstacles falling at once"]},
22:{t:"Treasure chest V2",g:"Build a secret lock! Enter a button sequence (A/B) then touch the logo to check. The right password opens the chest!",tip:"Start with a short code of 3 characters like 'ABA'. Each press adds to the code. Touching the logo checks the code and resets it.",n:["micro:bit V2","MakeCode editor"],b:["A → add \"A\" to code + confirmation sound","B → add \"B\" + different sound","Logo → check code: correct = 😀 / wrong = 😢"],c:["Change the secret: <code>\"ABA\"</code> → <code>\"ABBA\"</code>","Invent 3 different codes as a team and challenge each other!"]},
23:{t:"Yoga stillness challenge",g:"A stillness challenge! Stay perfectly still — if you move too much, you lose. You'll learn to read the accelerometer and compare force values.",tip:"The accelerometer measures force: ~1024 when still. If the value strays too far from 1024, you moved! Each moment of stillness lights one LED. 25 LEDs = you win!",n:["micro:bit","MakeCode editor"],b:["On start → PROGRESS=0","Forever → If low movement → +1 LED","If too much movement → X + reset"],c:["Challenge: stay still for 15 seconds to fill the whole screen!","Adjust threshold <code>100</code>: smaller = easier, bigger = harder"]},
24:{t:"Create custom functions",g:"Learn to create a function (custom block) you can reuse! You'll build a rain animation effect on the screen.",tip:"A function = a block of code you name and call whenever you want. Instead of repeating the same code, write it once in a function and call it!",n:["micro:bit","MakeCode editor"],b:["Create function RAIN() → animate a drop falling down","Call RAIN() in a forever loop"],c:["Change rain speed: pause 40 (fast) vs 150 (slow)","Challenge: make 2 drops fall at the same time"]},
25:{t:"Control a servo motor",g:"Move a servo motor to specific angles — like a barrier or robotic arm! You'll learn to control external hardware via pins.",tip:"Connect the servo: orange wire → P0, red → 3V, brown → GND. Classic positions: 0° (closed), 90° (middle), 180° (open).",n:["micro:bit","Servo motor","Wires/croc clips","MakeCode editor"],b:["Button A → servo to 0° (closed)","Logo → servo to 90° (middle)","Button B → servo to 180° (open)"],c:["Add pauses and make the servo 'dance' with sequential movements","Advanced: control the angle with light level (more light = bigger angle)"]},
26:{t:"Metal detector game",g:"A science game: does this material conduct electricity? Test different materials and discover which ones are metal!",tip:"Connect a wire from P0 and another from GND. Touch both wire ends to the material: if it conducts (metal) → high value. If not → low value.",n:["micro:bit","Wires/croc clips","MakeCode editor"],b:["Forever → V = analog read P0","If V > 500 → 😀 metal! + sound","Else → 😢 not metal"],c:["Test different materials: paperclip, foil, plastic, wood — record results!","Show the raw number with button A to understand the difference between materials"]},
27:{t:"Plant moisture monitor",g:"Build a smart monitoring system for your plant! Read a moisture sensor and display soil status: dry, ok, or wet.",tip:"Connect the analog sensor to P0. Start by showing the raw number (button A) to learn the values: stick the sensor in dry soil then wet soil and record the numbers.",n:["micro:bit","Analog moisture sensor","MakeCode editor"],b:["Button A → Show raw value for calibration","Forever → dry (<300)=😢, ok (300-600)=🙂, wet (>600)=😀"],c:["Record your 'dry' and 'wet' values to fine-tune the thresholds for your plant","Add a sound alert when the soil is too dry — time to water!"]},
28:{t:"External thermometer",g:"Read an external temperature sensor for more accurate measurements than the built-in one. A mini weather station project!",tip:"External sensors are more accurate than the built-in one. Connect to P0. Display every 10 seconds (not continuously) to save power and make it readable.",n:["micro:bit","External temperature sensor","MakeCode editor"],b:["Forever → T = read sensor × conversion factor","Show T → \"C\" → Pause 10s"],c:["Add MIN and MAX variables to track the highest and lowest temperatures (buttons A/B)","Show a bar graph of temperature on the LED screen"]},
29:{t:"Compose music V2",g:"Turn your micro:bit into a musical instrument! Compose tunes and play them using the built-in speaker.",tip:"Tempo controls playback speed. Notes: C=262Hz, D=294Hz, E=330Hz, G=392Hz. Try different frequencies!",n:["micro:bit V2","MakeCode editor"],b:["Button A → play 3 notes (C-E-G)","Button B → play built-in melody"],c:["Compose a happy song (high notes) and a sad one (low notes)","Change tempo: <code>setTempo(180)</code> = fast, <code>setTempo(60)</code> = slow"]},
30:{t:"Bluetooth remote control",g:"Connect your micro:bit to your phone via Bluetooth! Send and receive messages between the two devices. You'll learn about UART protocol.",tip:"Enable Bluetooth in MakeCode settings (Project → No pairing required). Download the official micro:bit app on your phone. UART service = send/receive text.",n:["micro:bit","Bluetooth app (micro:bit) on phone","MakeCode editor"],b:["Start UART Bluetooth service","Connected → 😀 | Disconnected → 😢","Read messages: '1' = LED on, '0' = off","Button A → send message to phone"],c:["Send '1' from the app to turn on an LED on P0, '0' to turn it off","Button A sends 'Hello!' to the phone — watch it appear in the app!","Create a mini chat: send words from the phone and see them scroll on the screen"]},
31:{t:"Grove modules + Bitmaker V2",g:"Expand your micro:bit's capabilities by connecting Grove external modules! You'll learn to read various sensors through the Bitmaker expansion board.",tip:"Bitmaker = expansion board that makes connecting Grove modules easy (no soldering). Read the value → display it → convert to sound or bar graph.",n:["micro:bit V2","Bitmaker board / Grove modules","MakeCode editor"],b:["Button A → read sensor → show number","Forever → map value to bar graph"],c:["Choose a simple sensor: light, button, or potentiometer","Map the read value to a sound frequency: higher = sharper"]},
32:{t:"7-segment digital display",g:"Show numbers on an external 7-segment display — bigger and clearer than the LED screen! A thermometer with a large display project.",tip:"Use the TM1637 extension in MakeCode (search in Extensions). Connect CLK to P1 and DIO to P2. The display shows 4 digits.",n:["micro:bit","7-segment display (TM1637)","MakeCode editor"],b:["Initialize TM1637 on P1 and P2","Forever → show temperature every 5s"],c:["Show '----' if sensor is disconnected — error handling!","Alternate between showing temperature and light level"]},
33:{t:"External buzzer theremin",g:"Connect an external buzzer and build a light-controlled instrument! The frequency changes based on ambient light — like a theremin.",tip:"Connect the buzzer to P0 and GND. Frequency = 200 + (light level × 3). Cover the screen with your hand and the sound changes!",n:["micro:bit","External buzzer","MakeCode editor"],b:["Forever → calculate frequency F = 200 + (light × 3)","Play tone at frequency F for 100ms"],c:["Gradually cover the board: sound goes low! Lift your hand: it goes high!","Use the accelerometer instead of light — tilt to play!"]},
34:{t:"Ultrasonic rangefinder",g:"Build a distance measuring device like car parking sensors! Use the HC-SR04 sensor to measure distance in centimeters.",tip:"The sensor sends a sound wave and measures the bounce-back time. Connect Trig to P1 and Echo to P2. Requires the sonar extension in MakeCode.",n:["micro:bit","Ultrasonic sensor (HC-SR04)","MakeCode editor"],b:["Forever → D = distance in cm (sonar.ping)","Show D on screen","If D < 10 → alarm sound!"],c:["Build a 'reverse alarm' like cars: beeps faster as you get closer!","Show a bar graph of distance on the LED screen"]},
35:{t:"Room intrusion alarm",g:"Build an alarm system that detects someone entering your room! Uses the light sensor to detect sudden changes.",tip:"When armed: saves the current light level. If light suddenly changes (door opening / light turning on) → alarm! Touch the logo to arm/disarm.",n:["micro:bit","MakeCode editor"],b:["Logo → arm/disarm","When armed → save baseline light level","Forever → if armed and light changed > 30 → sound alarm + skull icon"],c:["Test at night: shine a flashlight and watch the alarm trigger!","Adjust sensitivity threshold <code>30</code>: smaller = more sensitive"]},
36:{t:"Drawer security alarm",g:"Protect your stuff! Build an alarm that sounds when a drawer or cabinet opens. Uses a digital input (switch/contact).",tip:"Attach a small switch so it's pressed when the drawer is closed. Opening the drawer = releasing the switch = P0 becomes 1 = alarm!",n:["micro:bit","Small switch / magnetic contact","MakeCode editor"],b:["Button A → arm/disarm","Forever → if armed and P0 == 1 (drawer open) → alarm"],c:["Mount the contact with tape to detect drawer opening precisely","Add a 3-second delay before the alarm — gives you time to disarm"]},
37:{t:"Rainbow LED garland",g:"Control a strip of colorful RGB LEDs (NeoPixel)! Create a moving rainbow gradient that rotates endlessly.",tip:"Add the neopixel extension in MakeCode. Connect the NeoPixel strip to P0. Start with 8 LEDs. The showRainbow function creates the gradient automatically!",n:["micro:bit","NeoPixel strip (WS2812)","MakeCode editor"],b:["Initialize NeoPixel strip on P0 with 8 RGB LEDs","Show rainbow gradient → Forever: rotate + show every 100ms"],c:["Button A to speed up/slow down the rotation — disco effect!","Button B to change the number of colors in the gradient"]},
38:{t:"Sound level meter V2",g:"Display a live bar graph of ambient noise! Use the built-in microphone with a real-time bar chart.",tip:"Sound level: 0 (total silence) to 255 (very loud). plotBarGraph automatically maps the value to 5 LED columns.",n:["micro:bit V2","MakeCode editor"],b:["Forever → S = sound level → Plot bar graph (0-255)"],c:["Challenge with friends: who can whisper the quietest? vs loudest clap!","Add a threshold alert: if sound > 200 → warning sound + alert icon"]},
39:{t:"Robot: draw a square",g:"Program your robot to drive in a perfect square! You'll learn to create motor control functions and repeat a movement pattern.",tip:"Square = forward + turn 90° × 4 times. Create two functions: forward(ms) and turnRight(). Adjust the pause durations to match your robot's motors.",n:["Robot (micro:bit)","MakeCode editor"],b:["Create functions: FORWARD(ms) and TURN90()","Button A → repeat 4 times: forward + turn = square!"],c:["Adjust the timing until the square has equal sides","Challenge: make a triangle (3 times, 120°), hexagon (6 times, 60°)…"]},
40:{t:"Robot: ultrasonic obstacle avoidance",g:"Make your robot drive and dodge obstacles automatically! Uses the distance sensor to detect obstacles and turn around them.",tip:"Logic: if distance < 15 cm → stop → reverse → turn. Otherwise → keep driving forward. Make sure d > 0 to avoid false readings.",n:["Robot","Ultrasonic sensor","MakeCode editor"],b:["Forever → D = distance in cm","If D < 15 → stop → reverse → turn","Else → drive forward"],c:["Test with a box or book as obstacle — does it dodge successfully?","Add a beep sound when an obstacle is detected nearby"]},
41:{t:"Robot: bump switch obstacle avoidance",g:"Use mechanical micro-switches to detect actual physical collisions! When the robot bumps into something, it reverses and turns.",tip:"A micro-switch is the simplest sensor: open (0) or closed (1). Mount two switches at the front of the robot on P0 and P1.",n:["Robot","2 micro-switches","MakeCode editor"],b:["Forever → if P0==1 or P1==1 (collision!)","→ stop → reverse → turn","Else → drive forward"],c:["Mount the switches at angles to detect obstacles from both sides","Add a collision counter and show it with button A — how many bumps to reach the goal?"]},
42:{t:"Robot: navigate a maze",g:"Program your robot to navigate a maze using a smart strategy! Use the distance sensor to make decisions at each turn.",tip:"'Follow the right wall' strategy: if obstacle ahead → turn right. Otherwise → go straight. This strategy solves any simple maze!",n:["Robot","Distance sensor","MakeCode editor"],b:["Forever → D = distance","If D < 12 → stop + show 'R' + turn right","Else → forward + show arrow up"],c:["Draw a maze with colored tape on the floor","Advanced: try 'follow the left wall' strategy — is the result different?"]},
43:{t:"Autonomous explorer robot",g:"Build a robot that explores on its own without remote control! It avoids obstacles by randomly choosing left or right — semi-intelligent behavior.",tip:"When obstacle detected: stop → reverse → randomly choose left or right. This randomness prevents getting stuck in corners! Variety = intelligence.",n:["Robot","Distance sensor","MakeCode editor"],b:["Forever → D = distance","If D < 15 → stop + reverse","→ random: turn left 'L' or right 'R'","Else → forward"],c:["Add different sounds for turning left vs right","Challenge: attach a pen to the robot and let it trace its path on paper!"]},
44:{t:"Radio remote-control robot",g:"Turn a micro:bit into a remote control for your robot! One board sends commands, the other executes them.",tip:"You need 2 boards: transmitter (in your hand) and receiver (on the robot). Same radio group! A=forward, B=stop, tilt right/left=turn.",n:["2× micro:bit","Robot","MakeCode editor"],b:["Transmitter: A=send 1 (forward), B=send 2 (stop)","Tilt right=send 3, tilt left=send 4","Receiver: receive numbers → execute movement"],c:["Add an LED on the transmitter to confirm what you're sending","Add a 'reverse' command by pressing A+B together → send 5"]},
45:{t:"Smart parking barrier",g:"Build a smart parking barrier! It detects an arriving vehicle → opens the barrier → waits → closes automatically.",tip:"Sensor detects presence on P0. Servo on P1: 0° = closed, 90° = open. Sequence: detect → open → wait 3 seconds → close.",n:["micro:bit","PlanetX module + servo motor","MakeCode editor"],b:["Forever → if P0 detects vehicle","→ servo 90° (open) + checkmark + wait 3s","→ servo 0° (close) + X mark"],c:["Test with your hand as a 'car' — does it open and close smoothly?","Add a beep-beep sound when the barrier opens to alert pedestrians"]},
46:{t:"Digital coded lock",g:"Build a lock with a password! Enter a sequence of letters (A/B) and touch the logo to check. The right sequence = unlock!",tip:"Store each press in a text variable: A adds 'A', B adds 'B'. When logo touched: compare the text to the password. After checking: reset to empty.",n:["micro:bit","MakeCode editor"],b:["A → add 'A' to code + show 'A'","B → add 'B' to code + show 'B'","Logo → check: correct = 😀 / wrong = 😢 → reset"],c:["Increase password length: <code>\"ABBA\"</code> → <code>\"AABBA\"</code> — harder to guess!","Add a 3-attempt limit before total lockout!"]},
47:{t:"Traffic light simulator",g:"Build a realistic traffic light simulation with 3 LEDs! Green → amber → red with realistic timing.",tip:"Connect 3 LEDs (with resistors!) on P0 (green), P1 (amber), P2 (red). Correct order: green 5s → amber 2s → red 5s.",n:["micro:bit","3 LEDs (green/amber/red) + 3 resistors","MakeCode editor"],b:["Forever → Green P0 for 5s","→ Amber P1 for 2s","→ Red P2 for 5s"],c:["Button A for 'pedestrian' mode: longer red (10s) to allow crossing","Show a countdown on the LED screen during each phase"]},
48:{t:"Automatic smart lamp",g:"Build a lamp that turns on automatically when it gets dark! Like smart street lights.",tip:"Simple principle: if light level < threshold (e.g. 50) → turn on LED on P0. Otherwise → turn it off. The threshold determines when 'dark' starts.",n:["micro:bit","External LED or relay","MakeCode editor"],b:["Forever → L = light level","If L < 50 → turn on P0 + heart icon","Else → turn off P0 + clear screen"],c:["Cover the screen with your hand: the lamp turns on! Lift it: turns off!","Adjust threshold <code>50</code>: try 30 (darker) or 80 (more sensitive)"]},
49:{t:"Discover Vittascience",g:"Explore Vittascience: a French alternative to MakeCode! It offers visual blocks AND real MicroPython. Compare both platforms.",tip:"Vittascience (vittascience.com) is a free French platform supporting micro:bit. Key advantage: it generates real MicroPython code (not MakeCode Python). Start by recreating the temperature activity (#12) then dice (#10).",n:["micro:bit","Web browser","Free Vittascience account (vittascience.com)"],b:["Go to vittascience.com → choose Micro:bit","Create a new project in visual block mode","Recreate activity 12: button A → show temperature","Upload to board and test","Switch to Python mode → compare with MakeCode version"],c:["Compare Vittascience vs MakeCode menus: what's similar? What's different?","Redo activity 10 (dice) in Vittascience — is the code different?","Try editing Python code manually in Vittascience — what happens?"]},
50:{t:"AI camera: object tracking",g:"Use an AI camera (HuskyLens) to track a colored object and steer a robot toward it! Your first computer vision experiment.",tip:"Train the camera first: press the learning button on HuskyLens while pointing at the colored object. It will track it automatically! X position: 0 (left) to 320 (right). Center is around 160.",n:["Robot (micro:bit)","HuskyLens AI camera","I2C cable","MakeCode editor"],b:["Initialize HuskyLens via I2C","Forever → read camera → object X position","If X < 100 → turn left 'L'","If X > 220 → turn right 'R'","Else → drive forward","If nothing detected → stop"],c:["Start at slow speed then gradually increase when it works","Train the camera on a colored ball and watch the robot chase it!"]},
51:{t:"AI camera: face recognition",g:"Teach the AI camera to recognize your face! Register one or more faces and watch the camera identify them.",tip:"Enable Face Recognition mode on HuskyLens. Press the learning button while facing the camera from 30-50cm. You can register multiple faces (each gets a different ID).",n:["HuskyLens AI camera","micro:bit","I2C cable","MakeCode editor"],b:["Initialize HuskyLens via I2C","Button A → activate learning mode + show 'GO'","Forever → if known face → 😀 + show ID number","If unknown face → 😐"],c:["Test from different distances (close/far) and lighting — when does it fail?","Add a personalized greeting per person: ID 1 = 'Hi Alex!', ID 2 = 'Hey Sam!'"]},
52:{t:"AI camera: read AprilTags",g:"Use the AI camera to read AprilTag markers and trigger different actions for each one. Like a smart barcode system!",tip:"Note: HuskyLens reads AprilTags, not regular QR codes! Print the tags from the internet. Each tag has a unique ID (1, 2, 3…).",n:["HuskyLens AI camera","micro:bit","I2C cable","Printed AprilTags","MakeCode editor"],b:["Initialize HuskyLens in Tag mode","Forever → read detected tag","If ID = 1 → action A (e.g. sound)","If ID = 2 → action B (e.g. LED)","If nothing → wait…"],c:["Build a scavenger hunt: hide tags around the room and scan them with the camera!","Link each tag to a different robot movement: 1=forward, 2=right, 3=left"]},
53:{t:"Build an AI model V2",g:"Create a real Machine Learning model on the official micro:bit Create AI website! Train it to recognize movements then run it on your board.",tip:"Machine Learning = the board learns from YOUR examples! Create 2 classes: 'calm' (still) and 'moving' (shake). Collect 20+ examples per class — more examples = better accuracy!",n:["micro:bit V2","createai.microbit.org","MakeCode editor"],b:["Open createai.microbit.org","Create 2 categories: 'calm' and 'moving'","Connect board → collect 20+ examples per class","Press 'Train' → check accuracy","Export .hex file → load on board","Forever → if 'calm' → 😀, if 'moving' → ⚡"],c:["Add a unique sound for each class — calm music vs energetic sound","Challenge: create 3 classes instead of 2 (e.g.: still / walking / jumping)"]},
54:{t:"AI robot project V2",g:"Complete project: train an AI model on the Make: AI Robots platform then use it to drive a real robot!",tip:"The makeairobots.com platform guides you step by step. Start with the 'detect sound / react' tutorial — the simplest. The ML model runs directly on the micro:bit V2 processor!",n:["micro:bit V2","makeairobots.com","Compatible robot (optional)"],b:["Open makeairobots.com and choose a tutorial","Connect micro:bit V2 to browser","Collect training data (sound, movement…)","Train the model → check accuracy","Download .hex → flash to board → test!","Iterate: adjust thresholds → retrain → improve"],c:["Keep an experiment notebook: what you changed and the result — that's what real scientists do!","Challenge: combine 2 sensors (sound + movement) for a smarter decision"]},
55:{t:"Use arrays (lists)",g:"Learn to store multiple values in an array (list) and loop through them! You'll store temperature readings and find the minimum and maximum.",tip:"An array = an ordered list you can add to and read from. Like a box holding several numbers. push() adds, length counts, and you can loop through every element with a for loop.",n:["micro:bit","MakeCode editor"],b:["On start → create empty array []","Button A → add current temperature + show count","Button B → show all values one by one","Shake → find and show minimum and maximum"],c:["Store 5 readings then calculate the average (sum ÷ count) — a weather station!","Make an LED histogram of the stored values"]},
56:{t:"Work with text strings",g:"Learn to build, measure, and compare text strings! You'll build a word letter by letter and check it — the foundation of text programming.",tip:"A string = text in quotes. You can: join with (+), measure length with (.length), and compare with (==). Each button press adds a letter to the string!",n:["micro:bit","MakeCode editor"],b:["On start → define word = \"\" (empty)","Button A → add letter 'O' + show current word","Button B → add 'UI' + show word","Shake → show length + check: is it == 'OUI'?"],c:["Create a secret word and use shake to check — did it match?","Build a binary writing game: A=0, B=1 — write a binary number!"]},
57:{t:"First steps in robotics",g:"Introductory robotics activity! Learn basic controls: forward, backward, turn, stop. Each button triggers a different movement.",tip:"This is the FIRST robot activity — start here before activities 39-44! Connect motors to P0 and P1. Test each command separately before combining them.",n:["Robot (micro:bit)","MakeCode editor"],b:["Button A → forward 1 second + up arrow","Button B → backward 1 second + down arrow","A+B → turn right 0.5 second + show 'R'","Shake → emergency stop all motors"],c:["Make it drive forward then backward automatically (no buttons) — sequential programming!","Create a full course: forward → turn → forward → stop — like a racing circuit!"]},
58:{t:"Understanding AI",g:"Discover the principles of artificial intelligence through a simple guessing game! The board 'learns' from your choices and tries to predict the next one.",tip:"This isn't real AI, but it simulates the basic principle: learning from data! The board counts: if you pressed A more → it predicts A. Think: how could you improve this 'intelligence'?",n:["micro:bit","MakeCode editor"],b:["On start → counter A=0, counter B=0","Button A → increment A + show 'A'","Button B → increment B + show 'B'","Shake → board predicts: '?' → if A >= B → 'A!' else 'B!' → show ratio"],c:["Try to trick the board's 'prediction' — can you be truly random?","Add a score counter: +1 each time the board guesses right — what's its success rate?","Discuss: how is this similar to real AI like ChatGPT?"]}
}, ar: {
1:{t:"عرض نص على الشاشة",g:"تعلّم كيف تعرض رسالة نصية على شاشة الـ 25 LED في المايكروبت. ستتعرّف على أول مكعب برمجي: «عرض نص».",tip:"💡 ابدأ بكلمة قصيرة مثل «مرحبا» أو اسمك. النص يمرّ حرفاً بحرف على الشاشة. جرّب كلمات مختلفة وراقب السرعة!",n:["micro:bit","كابل USB","محرر MakeCode"],b:["عند البدء ← عرض نص \"مرحبا\""],c:["غيّر النص إلى اسمك — هل يظهر كاملاً؟","أضف أيقونة قلب بعد النص بـ <code>basic.showIcon(IconNames.Heart)</code>"]},
2:{t:"تمرير نص متكرر",g:"اجعل رسالة تتمرّر باستمرار على الشاشة في حلقة لا نهائية. ستتعرّف على مكعب «تكرار دائم» وأهمية التوقف.",tip:"💡 بدون «توقف»، النص يعيد نفسه فوراً! أضف pause بعد النص ليكون مقروءاً. جرّب قيماً مختلفة: 100 (سريع جداً) إلى 600 (بطيء).",n:["micro:bit","محرر MakeCode"],b:["تكرار دائم ← عرض نص \"HELLO\"","توقف 200 مللي ثانية"],c:["غيّر التوقف: جرّب <code>100</code> أو <code>300</code> أو <code>600</code> مللي ثانية — ما الأنسب؟","مرّر رسالتين مختلفتين بالتناوب"]},
3:{t:"عرض أيقونة",g:"اعرض أيقونة جاهزة (رسمة صغيرة) على شاشة LED. ستكتشف مكتبة الأيقونات المدمجة في MakeCode.",tip:"💡 الأيقونات موجودة في قائمة «أساسي» (Basic). هناك أكثر من 40 أيقونة جاهزة: قلب، وجه سعيد، بيت، بطة… جرّب عدة أيقونات!",n:["micro:bit","محرر MakeCode"],b:["عند البدء ← عرض أيقونة (قلب)"],c:["غيّر الأيقونة: جرّب <code>IconNames.House</code>، <code>IconNames.Happy</code>، <code>IconNames.Duck</code>","اعرض أيقونتين مختلفتين بالتناوب مع توقف بينهما"]},
4:{t:"صمّم أيقونتك الخاصة",g:"ارسم أيقونتك المخصصة على شبكة 5×5 بكسل. ستتعلّم التحكم بكل LED على حدة.",tip:"💡 كل نقطة (#) = LED مضاءة، كل نقطة (.) = LED مطفأة. ابدأ بحرف بسيط مثل حرفك الأول أو شكل هندسي بسيط.",n:["micro:bit","محرر MakeCode"],b:["عند البدء ← عرض LEDs (ارسم نمطك 5×5)"],c:["ارسم الحرف الأول من اسمك — هل يمكن قراءته؟","اصنع رسمتين تتناوبان مع توقف بينهما لإنشاء رسوم متحركة بسيطة"]},
5:{t:"وميض أيقونة",g:"اجعل أيقونة تومض مثل إنذار أو نبضة قلب. ستتعلّم مبدأ «عرض ← توقف ← مسح ← توقف» وهو أساس الرسوم المتحركة.",tip:"💡 الوميض = عرض الأيقونة ← انتظار ← مسح الشاشة ← انتظار ← تكرار. غيّر مدة التوقف لتسريع أو إبطاء الوميض!",n:["micro:bit","محرر MakeCode"],b:["تكرار ← عرض أيقونة قلب","توقف 300 مللي ثانية","مسح الشاشة","توقف 300 مللي ثانية"],c:["جرّب <code>100</code> مللي ثانية (وميض سريع) ثم <code>800</code> (وميض بطيء) — أيهما أجمل؟","بدّل بين أيقونتين مختلفتين بدل الوميض (مثلاً: قلب كبير ← قلب صغير)"]},
6:{t:"استخدام الأزرار A و B",g:"تعلّم ربط إجراءات مختلفة بكل زر. المايكروبت لديها زرّان (A يسار، B يمين) ويمكن الضغط عليهما معاً (A+B).",tip:"💡 لديك 3 أحداث: زر A وحده، زر B وحده، وA+B معاً. يمكنك عرض نص أو أيقونة أو تشغيل صوت عند كل ضغطة!",n:["micro:bit","محرر MakeCode"],b:["زر A ← عرض \"A\"","زر B ← عرض \"B\"","A+B ← عرض أيقونة قلب"],c:["اجعل A = وجه سعيد 😀 و B = وجه حزين 😢 باستخدام الأيقونات","أضف عدّاداً: A = +1 للعدّاد، B = عرض المجموع الحالي"]},
7:{t:"هزّ البطاقة",g:"نفّذ إجراءً عند هزّ المايكروبت! ستستخدم مستشعر التسارع المدمج الذي يكتشف الحركة تلقائياً.",tip:"💡 في المحاكاة على الكمبيوتر، اضغط زر SHAKE لتجربة الهزّ. على البطاقة الحقيقية، هزّها بقوة متوسطة.",n:["micro:bit","محرر MakeCode"],b:["عند الهزّ ← عرض أيقونة برق ⚡","توقف 500 مللي ثانية","مسح الشاشة"],c:["غيّر الأيقونة حسب مزاجك — اختر أيقونة تعبّر عن الطاقة!","أضف صوتاً مع الأيقونة بـ <code>music.playTone(440, 200)</code>"]},
8:{t:"اللمس الحساس V2",g:"اكتشف الشعار الذهبي في أعلى المايكروبت V2 — إنه زر لمس سحري! المسه لتشغيل لحن.",tip:"💡 الشعار الذهبي حساس للمس (متوفر فقط في micro:bit V2). ضع إصبعك عليه بلطف — لا حاجة للضغط بقوة.",n:["micro:bit V2","محرر MakeCode"],b:["عند لمس الشعار ← تشغيل لحن 🎵"],c:["جرّب ألحاناً مختلفة: <code>Melodies.Birthday</code>، <code>Melodies.Entertainer</code> — أيها المفضل؟","أضف عرض أيقونة نوتة موسيقية أثناء التشغيل"]},
9:{t:"الاستجابة للصوت V2",g:"اجعل المايكروبت تستجيب للأصوات المحيطة! صفّق بيديك وشاهد التفاعل. ستتعرّف على مستشعر الصوت المدمج والعتبات.",tip:"💡 ابدأ بعتبة 120. إذا كانت حساسة جداً، ارفعها إلى 200. إذا لم تستجب، خفّضها إلى 80. مستوى الصوت من 0 (صمت) إلى 255 (عالٍ جداً).",n:["micro:bit V2","محرر MakeCode"],b:["تكرار ← إذا مستوى الصوت > العتبة ← 😀 وإلا 😴"],c:["غيّر العتبة: <code>80</code> (حساس) أو <code>200</code> (يحتاج صوت عالٍ) — ما الفرق؟","اعرض الرقم الدقيق لمستوى الصوت بـ <code>basic.showNumber()</code> لفهم القيم"]},
10:{t:"لعبة النرد 🎲",g:"اصنع نرداً إلكترونياً يُظهر رقماً عشوائياً (1-6) في كل مرة تهزّ فيها البطاقة! ستتعلّم استخدام الأرقام العشوائية والمتغيرات.",tip:"💡 الدالة <code>randint(1, 6)</code> تختار رقماً عشوائياً بين 1 و6 — تماماً مثل رمي نرد حقيقي! العشوائي موجود في قائمة «رياضيات» (Math).",n:["micro:bit","محرر MakeCode"],b:["عند الهزّ ← ROLL = عشوائي 1 إلى 6","عرض العدد ROLL"],c:["غيّر المدى: <code>randint(1, 20)</code> لنرد ألعاب الأدوار 🐉","أضف صوتاً احتفالياً عند الحصول على الرقم 6! 🎉","تحدٍّ متقدم: اعرض وجه النرد بنقاط LED بدل الرقم"]},
11:{t:"حجر-ورقة-مقص ✊✋✌",g:"العب حجر-ورقة-مقص ضد صديقك! كل لاعب يهزّ بطاقته وتظهر إشارة عشوائية. ستتعلّم الشروط (إذا/وإلا).",tip:"💡 الفكرة: اختر رقماً عشوائياً 0 أو 1 أو 2، ثم استخدم شروط «إذا» لعرض الرمز المناسب. 0=حجر ✊، 1=مقص ✌، 2=ورقة ✋.",n:["micro:bit","محرر MakeCode"],b:["عند الهزّ ← N = عشوائي 0..2","إذا N=0 ← حجر ◻","إذا N=1 ← مقص ✂","وإلا ← ورقة ▪"],c:["أضف صوتاً مختلفاً لكل اختيار — صوت حاد للمقص مثلاً! ✂","تحدٍّ متقدم: أضف عدّاد انتصارات بين لاعبين باستخدام الراديو 📻"]},
12:{t:"ميزان حرارة رقمي 🌡",g:"حوّل المايكروبت إلى ميزان حرارة! اعرض درجة الحرارة المقاسة بالمعالج الداخلي (تقريبية وليست دقيقة 100%).",tip:"💡 اضغط الزر A لقراءة الحرارة — أفضل من العرض المستمر الذي يصعب قراءته. الحرارة المقاسة هي حرارة المعالج وليست حرارة الغرفة بالضبط.",n:["micro:bit","محرر MakeCode"],b:["زر A ← عرض عدد الحرارة (°C)"],c:["قارن بين الداخل والخارج — هل هناك فرق كبير؟ 🏠↔🌳","أضف أيقونة شمس ☀ إذا T > 25، وثلجة ❄ إذا T < 10"]},
13:{t:"صنع بوصلة رقمية 🧭",g:"حوّل المايكروبت إلى بوصلة تعرض الاتجاهات الأربعة! ستتعلّم استخدام مستشعر المغناطيسية (البوصلة) والشروط المتعددة.",tip:"💡 أول مرة تستخدم البوصلة، ستُطلب منك معايرتها: أَمِل البطاقة لملء شاشة LED بالنقاط. الزاوية 0°=شمال، 90°=شرق، 180°=جنوب، 270°=غرب.",n:["micro:bit","محرر MakeCode"],b:["زر A ← معايرة","تكرار ← DIR = اتجاه البوصلة (°)","عرض ش/ق/ج/غ حسب الزاوية"],c:["استدر ببطء على نفسك ولاحظ تغيّر الحرف 🔄","تحدٍّ: أضف 8 اتجاهات (ش.ق، ش.غ، ج.ق، ج.غ) بدل 4"]},
14:{t:"كاشف المشاعر 😀😐😢",g:"اقرأ قيمة كهربائية من المنفذ P0 واعرض وجهاً تعبيرياً. تجربة ممتعة لفهم القراءة التناظرية!",tip:"💡 هذه لعبة وليست قياساً علمياً! المس المنفذ P0 والمنفذ GND بأصابعك — مقاومة جلدك تُنتج قيمة كهربائية تتغيّر.",n:["micro:bit","أسلاك / مشابك تمساح","محرر MakeCode"],b:["تكرار ← V = قراءة تناظرية P0","إذا V > 500 ← 😀 وإلا 😐"],c:["المس P0 و GND بأصابعك — هل يتغيّر الوجه؟ 🤔","أضف 3 مستويات مشاعر بعتبات مختلفة: 😢 < 300 < 😐 < 600 < 😀"]},
15:{t:"عدّاد خطوات 👟",g:"اصنع عدّاد خطوات (بيدوميتر) باستخدام مستشعر التسارع! ستتعلّم المتغيرات العددية وتعديلها.",tip:"💡 كل هزّة = خطوة واحدة! زر A يعرض العدد الحالي، زر B يُعيد العدّاد إلى صفر. ثبّت البطاقة على كاحلك أو في جيبك للاختبار الحقيقي.",n:["micro:bit","محرر MakeCode"],b:["عند البدء ← STEPS = 0","عند الهزّ ← STEPS += 1","زر A ← عرض STEPS","زر B ← STEPS = 0"],c:["ثبّت البطاقة على كاحلك وامشِ 20 خطوة — هل العدّ دقيق؟ 🚶","أضف هدفاً: اعرض 🎉 واحتفل بصوت عند STEPS > 100"]},
16:{t:"قياس الإضاءة 💡",g:"استخدم شاشة LED كمستشعر ضوء! اقرأ مستوى الإضاءة (0 = ظلام، 255 = ضوء ساطع) واعرضه برسم بياني.",tip:"💡 المفاجأة: شاشة LED ليست فقط للعرض — يمكنها قياس الضوء أيضاً! غطِّ الشاشة بيدك وراقب القيمة تنخفض.",n:["micro:bit","محرر MakeCode"],b:["زر A ← عرض عدد مستوى الضوء","تكرار ← رسم بياني بالأعمدة"],c:["اذهب قرب نافذة ثم لزاوية مظلمة — كم الفرق؟ 🌞↔🌑","أضف عتبة ذكية: إذا الضوء < 50 أشعل كل الـ LED كمصباح"]},
17:{t:"التواصل بالراديو 📻",g:"أرسل واستقبل رسائل بين بطاقتي مايكروبت عبر الراديو! ستتعلّم البرمجة التعاونية بين جهازين.",tip:"💡 القاعدة الذهبية: البطاقتان يجب أن تكونا على نفس مجموعة الراديو (مثلاً: المجموعة 7). كل فريق يختار رقماً مختلفاً!",n:["2× micro:bit","محرر MakeCode"],b:["عند البدء ← مجموعة راديو 7","زر A ← إرسال الرقم 1","زر B ← إرسال الرقم 2","عند الاستقبال ← إذا 1 ← 😀، إذا 2 ← 😢"],c:["اختبر ببطاقتين في نفس الغرفة، ثم ابتعد — ما المسافة القصوى؟ 📏","أرسل نصاً بدل أرقام بـ <code>radio.sendString(\"مرحبا\")</code> 💬"]},
18:{t:"صنع مؤقت ⏱",g:"اصنع عدّاً تنازلياً! زر A يزيد الوقت ثانية بثانية، وزر B يبدأ العدّ التنازلي مع صوت في النهاية.",tip:"💡 A يضبط الوقت (اضغط عدة مرات)، B يبدأ العدّ التنازلي. عند الوصول لـ 0، يظهر «OK» مع صوت! استخدمه لتحدّيات الطبخ أو الألعاب.",n:["micro:bit","محرر MakeCode"],b:["عند البدء ← T = 0","زر A ← T += 1 ← عرض T","زر B ← عدّ تنازلي من T إلى 0 ← \"OK\" + صوت 🔔"],c:["استخدمه لتحدٍّ ممتع: 10 ثوانٍ لترتيب مكتبك! 🏃","أضف صفيراً «بيب» كل ثانية أثناء العدّ التنازلي 🔊"]},
19:{t:"مكبر الصوت المدمج V2 🔊",g:"اكتشف المكبر المدمج في micro:bit V2! شغّل ألحاناً جاهزة أو أنشئ نغماتك الخاصة.",tip:"💡 ابدأ في مكان هادئ لسماع الصوت جيداً. المكبر صغير لكنه واضح. هناك أكثر من 20 لحناً جاهزاً!",n:["micro:bit V2","محرر MakeCode"],b:["زر A ← تشغيل لحن 🎵 Dadadadum"],c:["أنشئ نغمة خاصة من 3 نوتات بـ <code>music.playTone(262, 500)</code> (دو الوسطى) 🎹","أضف زر B لإيقاف الموسيقى فوراً 🔇"]},
20:{t:"لعبة الهدف 🎯",g:"لعبة سرعة: اضغط B في اللحظة المناسبة عندما يظهر الرقم الصحيح! ستتعلّم مقارنة المتغيرات.",tip:"💡 زر A يُظهر رقماً عشوائياً (0-9). إذا كان الرقم هو هدفك (مثلاً 5)، اضغط B بسرعة! حدّد هدفك واتحدَّ أصدقاءك.",n:["micro:bit","محرر MakeCode"],b:["زر A ← N = عشوائي 0..9 ← عرض الرقم","زر B ← إذا N == 5 ← 😀 وإلا 😢"],c:["غيّر الهدف من <code>5</code> لرقم آخر — جرّب 0 أو 9 🔢","أضف عدّاد نقاط: +1 عند كل إجابة صحيحة 📈"]},
21:{t:"لعبة الكائنات المتحركة 👾",g:"اصنع لعبة فيديو صغيرة! تفادَ عوائق تسقط من أعلى الشاشة. مقدمة للكائنات المتحركة (sprites) والتصادم.",tip:"💡 المتطلبات: النشاط 6 (أزرار) و10 (عشوائي). الكائن (sprite) = نقطة LED متحركة. ابنِ اللعبة خطوة بخطوة: أولاً اللاعب، ثم العائق، ثم كشف التصادم.",n:["micro:bit","محرر MakeCode"],b:["عند البدء ← لاعب في X=2، Y=4، نقاط=0","زر A/B ← تحريك اللاعب يمين/يسار","تكرار ← عائق يسقط ← تصادم = نهاية اللعبة 💥"],c:["زِد سرعة السقوط كلما ارتفعت النقاط — لعبة أصعب تدريجياً! 🚀","تحدٍّ متقدم: أضف عدة عوائق تسقط في وقت واحد 💣"]},
22:{t:"صندوق الكنز V2 🔐",g:"اصنع قفلاً سرياً! أدخل تسلسل أزرار (A/B) ثم المس الشعار للتحقق. كلمة السر الصحيحة تفتح الصندوق!",tip:"💡 ابدأ برمز قصير من 3 أحرف مثل «ABA». كل ضغطة تُضاف للرمز. لمس الشعار يتحقق من الرمز ويُعيده لفارغ.",n:["micro:bit V2","محرر MakeCode"],b:["A ← إضافة \"A\" للرمز + صوت تأكيد 🔑","B ← إضافة \"B\" للرمز + صوت مختلف","الشعار ← التحقق من الرمز: صحيح = 😀🎵 / خطأ = 😢"],c:["غيّر الرمز السري: <code>\"ABA\"</code> ← <code>\"ABBA\"</code> 🔒","اخترعوا 3 رموز مختلفة كفريق واتحدّوا بعضكم! 🏆"]},
23:{t:"لعبة اليوغا 🧘",g:"تحدّي الثبات! ابقَ ساكناً تماماً — إذا تحركت كثيراً تخسر. ستتعلّم قراءة مستشعر التسارع ومقارنة القوة.",tip:"💡 مستشعر التسارع يقيس القوة: ~1024 عند السكون. إذا ابتعدت القيمة كثيراً عن 1024 = تحركت! كل لحظة ثبات تُضيء LED واحدة. 25 LED = فوز!",n:["micro:bit","محرر MakeCode"],b:["عند البدء ← PROGRESS=0","تكرار ← إذا حركة قليلة = +1 LED 💡","إذا حركة كبيرة = ✕ + إعادة من الصفر"],c:["تحدٍّ: ابقَ ثابتاً 15 ثانية لملء كل الشاشة! 🏆","اضبط العتبة <code>100</code>: أصغر = أسهل، أكبر = أصعب"]},
24:{t:"إنشاء دوالّ خاصة ⚙",g:"تعلّم إنشاء دالة (مكعب مخصّص) يمكنك إعادة استخدامها! ستصنع تأثير مطر متحرك على الشاشة.",tip:"💡 الدالة = كتلة كود تسمّيها وتستدعيها متى شئت. بدل تكرار نفس الكود، اكتبه مرة واحدة في دالة واستدعها!",n:["micro:bit","محرر MakeCode"],b:["إنشاء دالة RAIN() ← تحريك نقطة من أعلى لأسفل","استدعاء RAIN() في حلقة تكرار لا نهائية"],c:["غيّر سرعة المطر: توقف 40 (سريع) مقابل 150 (بطيء) ☔","تحدٍّ: اصنع قطرتين تسقطان في نفس الوقت 🌧"]},
25:{t:"التحكم بمحرك سيرفو 🦾",g:"حرّك محرك سيرفو إلى زوايا محددة — مثل حاجز أو ذراع آلية! ستتعلّم التحكم بأجهزة خارجية عبر المنافذ.",tip:"💡 السيرفو يتحرك بين 0° و180°. وصّله: سلك برتقالي ← P0، أحمر ← 3V، بنّي ← GND. المواقع الكلاسيكية: 0° (مغلق)، 90° (وسط)، 180° (مفتوح).",n:["micro:bit","محرك سيرفو","أسلاك/مشابك تمساح","محرر MakeCode"],b:["زر A ← سيرفو إلى 0° (مغلق)","الشعار ← سيرفو إلى 90° (وسط)","زر B ← سيرفو إلى 180° (مفتوح)"],c:["أضف توقفات واصنع 'رقصة' للسيرفو بحركات متتالية 💃","تحدٍّ متقدم: تحكم بالزاوية عبر مستوى الضوء (ضوء أكثر = زاوية أكبر)"]},
26:{t:"كاشف المعادن 🔍",g:"لعبة علمية: هل هذا المادة توصّل الكهرباء؟ اختبر مواد مختلفة واكتشف أيها معدن! ستتعلّم القراءة التناظرية والعتبات.",tip:"💡 وصّل سلكاً من P0 وآخر من GND. المس طرفي السلكين بالمادة: إذا توصّل (معدن) ← قيمة عالية. إذا لم يوصّل ← قيمة منخفضة.",n:["micro:bit","أسلاك/مشابك تمساح","محرر MakeCode"],b:["تكرار ← V = قراءة تناظرية P0","إذا V > 500 ← 😀 معدن! + صوت 🔔","وإلا ← 😢 ليس معدناً"],c:["اختبر مواد مختلفة: مشبك ورق، ألمنيوم، بلاستيك، خشب — سجّل النتائج! 📋","اعرض القيمة الرقمية الخام بالزر A لفهم الفرق بين المواد"]},
27:{t:"مراقبة رطوبة النبتة 🌱",g:"اصنع نظام مراقبة ذكي لنبتتك! اقرأ مستشعر الرطوبة واعرض حالة التربة: جافة أو جيدة أو رطبة.",tip:"💡 وصّل المستشعر التناظري بـ P0. ابدأ بعرض الرقم الخام (زر A) لمعرفة القيم: اغرس المستشعر في تربة جافة ثم رطبة وسجّل الأرقام.",n:["micro:bit","مستشعر رطوبة تربة (تناظري)","محرر MakeCode"],b:["زر A ← عرض القيمة الخام للمعايرة","تكرار ← جاف (<300) = 😢، جيد (300-600) = 🙂، رطب (>600) = 😀"],c:["سجّل قيم «جاف» و«مبلل» لضبط العتبات بدقة لنبتتك 📊","أضف تنبيهاً صوتياً عندما تحتاج النبتة للسقي! 🚿"]},
28:{t:"ميزان حرارة خارجي 🌡",g:"اقرأ مستشعر حرارة خارجي للحصول على قياس أدق من المستشعر المدمج. مشروع محطة أرصاد صغيرة!",tip:"💡 المستشعر الخارجي أدق من المدمج. وصّله بـ P0. اعرض القراءة كل 10 ثوانٍ (وليس باستمرار) لتوفير الطاقة وسهولة القراءة.",n:["micro:bit","مستشعر حرارة خارجي","محرر MakeCode"],b:["تكرار ← T = قراءة المستشعر × معامل التحويل","عرض T ← \"C\" ← توقف 10 ثوانٍ"],c:["أضف متغيرات MIN و MAX لتسجيل أعلى وأخفض درجة (أزرار A/B) 📈","اعرض رسماً بيانياً بالأعمدة للحرارة على الشاشة"]},
29:{t:"عزف الموسيقى V2 🎵",g:"حوّل المايكروبت إلى آلة موسيقية! ألّف نغمات وعزفها باستخدام المكبر المدمج.",tip:"💡 الإيقاع (tempo) يتحكم بسرعة العزف. النوتات: Do=262Hz، Re=294Hz، Mi=330Hz، Sol=392Hz. جرّب ترددات مختلفة!",n:["micro:bit V2","محرر MakeCode"],b:["زر A ← عزف 3 نوتات (Do-Mi-Sol) 🎹","زر B ← تشغيل لحن جاهز 🎶"],c:["ألّف أغنية سعيدة (نوتات عالية) وأخرى حزينة (نوتات منخفضة) 🎭","غيّر الإيقاع: <code>setTempo(180)</code> = سريع 🏃، <code>setTempo(60)</code> = بطيء 🐌"]},
30:{t:"التحكم بالبلوتوث 🔵",g:"وصّل المايكروبت بهاتفك عبر البلوتوث! أرسل واستقبل رسائل بين الجهازين. ستتعلّم بروتوكول UART.",tip:"💡 فعّل البلوتوث في إعدادات MakeCode (مشروع ← بدون اقتران). حمّل تطبيق micro:bit الرسمي على هاتفك. خدمة UART = إرسال/استقبال نصوص.",n:["micro:bit","تطبيق بلوتوث (micro:bit) على الهاتف","محرر MakeCode"],b:["بدء خدمة UART بلوتوث","متصل ← 😀 | غير متصل ← 😢","قراءة الرسائل: '1' = تشغيل LED، '0' = إيقاف","زر A ← إرسال رسالة للهاتف"],c:["أرسل '1' من التطبيق لتشغيل LED على P0، '0' لإيقافها 💡","زر A يرسل «مرحبا» للهاتف — شاهدها تظهر في التطبيق! 📱","أنشئ محادثة صغيرة: أرسل كلمات من الهاتف وشاهدها تمرّ على الشاشة 💬"]},
31:{t:"وحدات Grove + Bitmaker V2 🔧",g:"وسّع قدرات المايكروبت بتوصيل وحدات Grove خارجية! ستتعلّم قراءة مستشعرات متنوعة عبر واجهة Bitmaker.",tip:"💡 Bitmaker = لوحة توسيع تسهّل توصيل وحدات Grove بدون لحام. اقرأ القيمة ← اعرضها ← حوّلها لصوت أو رسم بياني.",n:["micro:bit V2","لوحة Bitmaker / وحدات Grove","محرر MakeCode"],b:["زر A ← قراءة المستشعر ← عرض القيمة الرقمية","تكرار ← تعيين القيمة لرسم بياني بالأعمدة"],c:["اختر مستشعراً بسيطاً: ضوء 💡، زر 🔘، أو مقاومة متغيرة 🎛","عيّن القيمة المقروءة لتردد صوتي: أعلى = أحدّ 🎵"]},
32:{t:"شاشة العرض الرقمي 7 أجزاء",g:"اعرض أرقاماً على شاشة 7 أجزاء خارجية — أكبر وأوضح من شاشة LED! مشروع ميزان حرارة بشاشة كبيرة.",tip:"💡 استخدم إضافة TM1637 في MakeCode (ابحث عنها في Extensions). وصّل CLK بـ P1 و DIO بـ P2. الشاشة تعرض 4 أرقام.",n:["micro:bit","شاشة عرض 7 أجزاء (TM1637)","محرر MakeCode"],b:["تهيئة TM1637 على P1 و P2","تكرار ← عرض درجة الحرارة على الشاشة كل 5 ثوانٍ"],c:["اعرض '----' إذا المستشعر غير متصل — معالجة الأخطاء! ⚠","بدّل بين عرض الحرارة 🌡 وعرض مستوى الإضاءة 💡"]},
33:{t:"جرس خارجي 🔔",g:"وصّل جرساً خارجياً واصنع آلة موسيقية تتحكم بها بالضوء! التردد يتغيّر حسب الإضاءة المحيطة.",tip:"💡 وصّل الجرس بـ P0 و GND. التردد = 200 + (مستوى الضوء × 3). غطِّ الشاشة بيدك والصوت يتغيّر — كالثيرمين!",n:["micro:bit","جرس خارجي (buzzer)","محرر MakeCode"],b:["تكرار ← حساب التردد F = 200 + (ضوء × 3)","عزف نغمة بتردد F لمدة 100ms"],c:["غطِّ البطاقة تدريجياً: الصوت ينخفض! ارفع يدك: يرتفع! 🎶","استخدم مقياس التسارع بدل الضوء — حرّك البطاقة لتعزف! 🎸"]},
34:{t:"قياس المسافات بالموجات فوق الصوتية 📏",g:"اصنع جهاز قياس مسافات مثل رادار السيارات! استخدم مستشعر HC-SR04 لقياس المسافة بالسنتيمتر.",tip:"💡 المستشعر يرسل موجة صوتية ويقيس وقت ارتدادها. وصّل Trig بـ P1 و Echo بـ P2. يحتاج إضافة sonar في MakeCode.",n:["micro:bit","مستشعر المسافة فوق الصوتي (HC-SR04)","محرر MakeCode"],b:["تكرار ← D = المسافة بالسنتيمتر (sonar.ping)","عرض D على الشاشة","إذا D < 10 ← صوت إنذار! 🚨"],c:["اصنع «إنذار رجوع» مثل السيارات: يصفر أسرع كلما اقتربت! 🚗","اعرض رسماً بيانياً بالأعمدة للمسافة على شاشة LED 📊"]},
35:{t:"إنذار حماية الغرفة 🚨",g:"اصنع نظام إنذار يكتشف دخول شخص لغرفتك! يستخدم مستشعر الضوء لكشف التغيّرات المفاجئة.",tip:"💡 عند التسليح: يحفظ مستوى الضوء الحالي. إذا تغيّر الضوء فجأة (فتح باب/إضاءة) ← إنذار! المس الشعار لتسليح/إلغاء التسليح.",n:["micro:bit","محرر MakeCode"],b:["الشعار ← تسليح 🎯 / إلغاء 😴","عند التسليح ← حفظ مستوى الضوء الأساسي","تكرار ← إذا مسلّح وتغيّر الضوء > 30 ← إنذار صوتي 🔊 + 💀"],c:["اختبر ليلاً: أشعل مصباحاً يدوياً وراقب الإنذار! 🔦","اضبط حساسية العتبة <code>30</code>: أصغر = أكثر حساسية"]},
36:{t:"إنذار حماية الدُّرج 🗄",g:"احمِ أغراضك! اصنع إنذاراً يُصدر صوتاً عند فتح درج أو خزانة. يستخدم مدخلاً رقمياً (مفتاح/موصل).",tip:"💡 ثبّت مفتاحاً صغيراً (switch) بحيث يكون مضغوطاً عندما الدرج مغلق. فتح الدرج = تحرير المفتاح = P0 يصبح 1 = إنذار!",n:["micro:bit","مفتاح صغير / موصل مغناطيسي","محرر MakeCode"],b:["زر A ← تسليح/إلغاء التسليح 🔐","تكرار ← إذا مسلّح و P0 == 1 (الدرج مفتوح) ← إنذار 🔊 + 💀"],c:["ثبّت الموصل بشريط لاصق ليكشف فتح الدرج بدقة 📦","أضف تأخيراً 3 ثوانٍ قبل الإنذار — لتعطيك وقت لإلغاء التسليح ⏱"]},
37:{t:"إكليل ألوان قوس قزح 🌈",g:"تحكم بشريط أضواء LED ملونة (NeoPixel)! اصنع تدرّجاً متحركاً بألوان قوس قزح.",tip:"💡 أضف إضافة neopixel في MakeCode. وصّل شريط NeoPixel بـ P0. ابدأ بـ 8 أضواء. الدالة showRainbow تُنشئ تدرّجاً تلقائياً!",n:["micro:bit","شريط NeoPixel (WS2812)","محرر MakeCode"],b:["تهيئة شريط NeoPixel على P0 مع 8 أضواء RGB","عرض تدرّج قوس قزح ← تكرار: دوران + عرض كل 100ms"],c:["زر A لتسريع/إبطاء الدوران — تأثير ديسكو! 🕺","زر B لتغيير عدد الألوان في التدرّج 🎨"]},
38:{t:"مقياس مستوى الصوت V2 📊",g:"اعرض رسماً بيانياً حياً للضوضاء المحيطة! ستستخدم مستشعر الصوت المدمج مع رسم بالأعمدة.",tip:"💡 مستوى الصوت: 0 (صمت تام) إلى 255 (ضجيج عالٍ). plotBarGraph يعيّن القيمة لـ 5 أعمدة LED تلقائياً.",n:["micro:bit V2","محرر MakeCode"],b:["تكرار ← S = مستوى الصوت ← رسم بياني بالأعمدة (0-255)"],c:["تحدٍّ مع الأصدقاء: من يستطيع الهمس بأخفض صوت؟ مقابل أعلى تصفيق! 👏","أضف تنبيه عتبة: إذا الصوت > 200 ← صوت إنذار + أيقونة تحذير ⚠"]},
39:{t:"روبوت: ارسم مربعاً ⬜",g:"برمج روبوتك ليتحرك في شكل مربع! ستتعلّم إنشاء دوالّ للتحكم بالمحركات وتكرار نمط حركي.",tip:"💡 مربع = تقدم + دوران 90° × 4 مرات. أنشئ دالتين: avancer(ms) و tournerDroite(). اضبط أوقات التوقف حسب سرعة محركات روبوتك.",n:["روبوت (micro:bit)","محرر MakeCode"],b:["إنشاء دوالّ: FORWARD(ms) و TURN90()","زر A ← تكرار 4 مرات: تقدم + دوران = مربع!"],c:["اضبط أوقات التوقف حتى يرسم مربعاً متساوي الأضلاع 📐","تحدٍّ: اصنع مثلثاً (3 مرات، 120°)، سداسياً (6 مرات، 60°)… 📐"]},
40:{t:"روبوت: تفادي العوائق (فوق صوتي) 🤖",g:"اجعل روبوتك يتحرك ويتفادى العوائق تلقائياً! يستخدم مستشعر المسافة لاكتشاف العوائق والدوران حولها.",tip:"💡 المنطق: إذا المسافة < 15 سم ← توقف ← ارجع ← دُر. وإلا ← تابع التقدم. تأكد من d > 0 لتجنب قراءات خاطئة.",n:["روبوت","مستشعر المسافة فوق الصوتي","محرر MakeCode"],b:["تكرار ← D = المسافة بالسنتيمتر","إذا D < 15 ← توقف ← رجوع ← دوران ← ✕","وإلا ← تقدم ← ↑"],c:["اختبر بصندوق أو كتاب كعائق — هل يتفاداه بنجاح؟ 📦","أضف صوت «بيب» عند كشف عائق قريب 🔊"]},
41:{t:"روبوت: تفادي بالمفاتيح 🤖",g:"استخدم مفاتيح ميكانيكية صغيرة لكشف التصادم الفعلي! عند لمس العائق، الروبوت يرجع ويدور.",tip:"💡 المفتاح الميكانيكي = أبسط مستشعر: مفتوح (0) أو مغلق (1). ثبّت مفتاحين في مقدمة الروبوت على P0 و P1.",n:["روبوت","مفتاحان ميكانيكيان صغيران","محرر MakeCode"],b:["تكرار ← إذا P0==1 أو P1==1 (تصادم!)","← توقف ← رجوع ← دوران","وإلا ← تقدم"],c:["ضع المفتاحين في مقدمة الروبوت بزاوية للكشف من الجانبين 🔧","أضف عدّاد تصادمات واعرضه بزر A — كم تصادم قبل الوصول؟ 📊"]},
42:{t:"روبوت: عبور متاهة 🏁",g:"برمج روبوتك لعبور متاهة باستراتيجية ذكية! استخدم المستشعر لاتخاذ قرارات عند كل منعطف.",tip:"💡 استراتيجية «اتبع الجدار الأيمن»: إذا عائق أمامك ← دُر يميناً. وإلا ← تابع مستقيماً. هذه الاستراتيجية تحلّ أي متاهة بسيطة!",n:["روبوت","مستشعر مسافة","محرر MakeCode"],b:["تكرار ← D = المسافة","إذا D < 12 ← توقف + عرض \"D\" + دوران يمين","وإلا ← تقدم + عرض ↑"],c:["ارسم متاهة بالشريط اللاصق الملون على الأرض 🏗","تحدٍّ متقدم: جرّب استراتيجية «اتبع الجدار الأيسر» — هل النتيجة مختلفة؟ 🤔"]},
43:{t:"روبوت مستقل ذكي 🧠🤖",g:"اصنع روبوتاً يستكشف المكان وحده بدون تحكم! يتفادى العوائق بتغيير الاتجاه عشوائياً — سلوك شبه ذكي.",tip:"💡 عند كشف عائق: توقف ← ارجع ← اختر اتجاهاً عشوائياً (يمين أو يسار). هذا يمنعه من العلق في الزوايا! التنويع = ذكاء.",n:["روبوت","مستشعر مسافة","محرر MakeCode"],b:["تكرار ← D = المسافة","إذا D < 15 ← توقف + رجوع","← عشوائي: يسار \"G\" أو يمين \"D\"","وإلا ← تقدم ↑"],c:["أضف صوتاً مختلفاً عند الدوران يميناً مقابل يساراً 🔊","تحدٍّ: اجعله يرسم مساره على ورقة — ثبّت قلماً على الروبوت! ✏"]},
44:{t:"تحكم بالروبوت عن بعد (راديو) 📡🤖",g:"حوّل مايكروبت إلى جهاز تحكم عن بعد لروبوتك! بطاقة ترسل الأوامر وأخرى تنفّذها.",tip:"💡 تحتاج بطاقتين: المُرسل (في يدك) والمُستقبل (على الروبوت). نفس مجموعة الراديو! A=أمام، B=توقف، ميل يمين/يسار=دوران.",n:["2× micro:bit","روبوت","محرر MakeCode"],b:["المُرسل: A=إرسال 1 (أمام)، B=إرسال 2 (توقف)","ميل يمين=إرسال 3، ميل يسار=إرسال 4","المُستقبل: استقبال الأرقام ← تنفيذ الحركة"],c:["أضف LED على المُرسل لرؤية ما ترسله — تأكيد بصري 💡","أضف أمر 'رجوع' بضغط A+B معاً ← إرسال 5 ⬇"]},
45:{t:"حاجز موقف ذكي 🅿",g:"اصنع حاجز موقف سيارات ذكي! يكشف وصول مركبة ← يفتح الحاجز ← ينتظر ← يغلق تلقائياً.",tip:"💡 المستشعر يكشف الوجود على P0. السيرفو على P1: 0° = مغلق، 90° = مفتوح. التسلسل: كشف ← فتح ← انتظار 3 ثوانٍ ← إغلاق.",n:["micro:bit","وحدة PlanetX + محرك سيرفو","محرر MakeCode"],b:["تكرار ← إذا P0 كشف مركبة","← سيرفو 90° (فتح) + ✓ + انتظار 3 ثوانٍ","← سيرفو 0° (إغلاق) + ✕"],c:["اختبر بيدك كـ «سيارة» — هل يفتح ويغلق بسلاسة؟ 🖐","أضف صفيراً «بيب-بيب» عند فتح الحاجز لتنبيه المشاة 🔊"]},
46:{t:"قفل رقمي مشفّر 🔐",g:"اصنع قفلاً بكلمة سر! أدخل تسلسل أحرف (A/B) والمس الشعار للتحقق. التسلسل الصحيح = فتح!",tip:"💡 خزّن كل ضغطة في نص: A يضيف 'A'، B يضيف 'B'. عند لمس الشعار: قارن النص بكلمة السر. بعد التحقق: أعِد النص لفارغ.",n:["micro:bit","محرر MakeCode"],b:["A ← إضافة 'A' للرمز + عرض 'A'","B ← إضافة 'B' للرمز + عرض 'B'","الشعار ← التحقق: صحيح = 😀 / خطأ = 😢 ← إعادة تعيين"],c:["زِد طول الرمز: <code>\"ABBA\"</code> ← <code>\"AABBA\"</code> — أصعب للتخمين! 🔒","أضف حدّ 3 محاولات فقط قبل الحظر الكامل! ⛔"]},
47:{t:"إشارات مرور ضوئية 🚦",g:"اصنع محاكاة لإشارة مرور حقيقية بـ 3 أضواء LED! أخضر ← برتقالي ← أحمر بتوقيتات واقعية.",tip:"💡 وصّل 3 أضواء LED (مع مقاومات!) على P0 (أخضر)، P1 (برتقالي)، P2 (أحمر). الترتيب الصحيح: أخضر 5 ثوانٍ ← برتقالي 2 ثانية ← أحمر 5 ثوانٍ.",n:["micro:bit","3 أضواء LED (أخضر/برتقالي/أحمر) + 3 مقاومات","محرر MakeCode"],b:["تكرار ← أخضر P0 لمدة 5 ثوانٍ 🟢","← برتقالي P1 لمدة 2 ثانية 🟡","← أحمر P2 لمدة 5 ثوانٍ 🔴"],c:["زر A لتفعيل وضع «مشاة»: أحمر أطول (10 ثوانٍ) للسماح بالعبور 🚶","اعرض عدّاً تنازلياً على شاشة LED أثناء كل مرحلة ⏱"]},
48:{t:"مصباح ذكي تلقائي 💡",g:"اصنع مصباحاً يُضيء تلقائياً عندما يحلّ الظلام! مثل أضواء الشوارع الذكية.",tip:"💡 المبدأ بسيط: إذا مستوى الضوء < عتبة (مثلاً 50) ← شغّل LED على P0. وإلا ← أطفئها. العتبة تحدد متى «يحلّ الظلام».",n:["micro:bit","LED خارجية أو مُرَحِّل (relay)","محرر MakeCode"],b:["تكرار ← L = مستوى الضوء","إذا L < 50 ← تشغيل P0 + أيقونة قلب 💡","وإلا ← إيقاف P0 + مسح الشاشة"],c:["غطِّ الشاشة بيدك: المصباح يضيء! ارفعها: ينطفئ! 🖐","اضبط العتبة <code>50</code>: جرّب 30 (أكثر ظلاماً) أو 80 (أكثر حساسية)"]},
49:{t:"اكتشاف منصة Vittascience 🌐",g:"اكتشف Vittascience: محرر برمجة فرنسي بديل لـ MakeCode! يقدم برمجة بالمكعبات وبايثون حقيقي. قارن بين المنصتين.",tip:"💡 Vittascience (vittascience.com) منصة فرنسية مجانية تدعم micro:bit. الميزة: تُنتج كود MicroPython حقيقي وليس MakeCode Python. ابدأ بإعادة نشاط الحرارة (#12) ثم النرد (#10).",n:["micro:bit","متصفح ويب","حساب مجاني على vittascience.com"],b:["اذهب إلى vittascience.com ← اختر Micro:bit","إنشاء مشروع جديد بوضع المكعبات البصرية","إعادة النشاط 12: زر A ← عرض الحرارة","رفع الكود للبطاقة واختبار","التبديل لوضع بايثون ← مقارنة الكود بنسخة MakeCode"],c:["قارن قوائم Vittascience و MakeCode: ما المتشابه وما المختلف؟ 🔍","أعد النشاط 10 (نرد 🎲) في Vittascience — هل الكود مختلف؟","جرّب تعديل كود بايثون يدوياً في Vittascience — ماذا يحدث؟ 🐍"]},

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ═══════════════════════════════════════════════════════════════════
// VISUAL BLOCK RENDERER
// ═══════════════════════════════════════════════════════════════════
function renderArg(a){
  if(typeof a==="string") return `<span class="varg str">${esc(a)}</span>`;
  if(typeof a==="number") return `<span class="varg round">${a}</span>`;
  if(a && a.label) return renderOneBlock(a);
  return `<span class="varg round">${esc(String(a))}</span>`;
}
function renderOneBlock(b){
  const cat = "cat-"+(b.cat||"basic");
  const type = b.type||"stack";
  if(type==="cblock"){
    const elseLabel = lang==="ar"?"وإلا":lang==="en"?"else":"sinon";
    let h = `<div class="vblock cblock ${cat}"><div class="cblock-row">${esc(b.label)}`;
    if(b.arg!==undefined) h += " "+renderArg(b.arg);
    h += `</div><div class="cblock-body">`;
    if(b.children) b.children.forEach(c => { h += renderOneBlock(c); });
    if(!b.children || b.children.length===0) h += `<div style="height:24px"></div>`;
    h += `</div>`;
    if(b.else){
      h += `<div class="cblock-else">${elseLabel}</div><div class="cblock-body">`;
      b.else.forEach(c => { h += renderOneBlock(c); });
      h += `</div>`;
    }
    h += `<div class="cblock-cap"></div></div>`;
    return h;
  }
  let h = `<div class="vblock ${type} ${cat}">${esc(b.label)}`;
  if(b.arg!==undefined) h += " "+renderArg(b.arg);
  if(b.args) b.args.forEach(a => { h += " "+renderArg(a); });
  h += `</div>`;
  return h;
}
function highlightPython(code){
  return esc(code)
    .replace(/(#.*)/g,'<span class="py-comment">$1</span>')
    .replace(/\b(def|if|elif|else|while|for|in|return|import|from|global|not|and|or|True|False|range|len|min|max|abs)\b/g,'<span class="py-keyword">$1</span>')
    .replace(/(&quot;[^&]*?&quot;|'[^']*?')/g,'<span class="py-string">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="py-number">$1</span>');
}
function renderBlocks(tree){
  if(!tree || !Array.isArray(tree)) return "";
  let h = `<div class="block-canvas">`;
  tree.forEach(b => { h += renderOneBlock(b); });
  h += `</div>`;
  return h;
}
function getStatus(a){if(progress.fav[a.id])return"fav";if(progress.done[a.id])return"done";return"todo";}

function tagHTML(a){
  let h = "";
  const sl = a.part==="simple" ? t("simpleTag") : t("advTag");
  h += `<span class="tag ${a.part==='simple'?'simple':'adv'}">${sl}</span>`;
  h += `<span class="tag d${a.difficulty}">${'⭐'.repeat(a.difficulty)}</span>`;
  h += `<span class="tag">⏱ ${esc(a.time)}</span>`;
  if(a.v2) h += `<span class="tag v2">V2</span>`;
  if(a.ia) h += `<span class="tag ia">${lang==="ar"?"ذ.إ.":"IA"}</span>`;
  return h;
}

  const ia = $("onlyIA").checked;

  let list = A.slice();
  if(currentTopic !== "all") {
    const topicIds = TOPICS[currentTopic] && TOPICS[currentTopic].ids;
    if(topicIds) list = list.filter(a => topicIds.includes(a.id));
  }
  if(q) list = list.filter(a => {
    const title = ta(a,"title");
    const goal = ta(a,"goal");
    const tip = ta(a,"tip");
    return [title,goal,tip,a.title,a.goal,...a.blocks,...a.challenges.map(c=>c.t),a.v2?"v2":"",a.ia?"ia":""].join(" ").toLowerCase().includes(q);
  });
  if(part!=="all") list = list.filter(a => a.part===part);
  if(diff!=="all") list = list.filter(a => a.difficulty===Number(diff));
  if(v2) list = list.filter(a => a.v2);
  if(ia) list = list.filter(a => a.ia);
  if(status!=="all") list = list.filter(a => getStatus(a)===status);

  currentList = list;

  const doneC = Object.keys(progress.done).length;
  const favC = Object.keys(progress.fav).length;
  $("statsRow").innerHTML = `<span>${t("results")} : <strong>${list.length}</strong> ${t("of")}</span><span>${t("doneL")} : <strong>${doneC}</strong></span><span>${t("favL")} : <strong>${favC}</strong></span>`;
  $("statsText").textContent = `${doneC} / 58`;

  if(list.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">${t("noResults")}</div>`;
    return;
  }

  grid.innerHTML = list.map((a,idx) => {
    const st = getStatus(a);
    const chip = st==="done"?`<span class="chip done">${t("chipDone")}</span>`:st==="fav"?`<span class="chip fav">${t("chipFav")}</span>`:`<span class="chip todo">${t("chipTodo")}</span>`;
    const goalText = ta(a,"goal");
    const preview = goalText.length>80 ? goalText.slice(0,80)+"…" : goalText;
    return `<article class="act-card" data-id="${a.id}" data-diff="${a.difficulty}" style="--i:${idx}">
      <div class="card-top"><div class="tags">${tagHTML(a)}</div><span class="card-id">#${a.id}</span></div>
      <h3>${esc(ta(a,"title"))}</h3>
      <p class="preview">${esc(preview)}</p>
      <div class="card-bottom">${chip}<button class="primary btn-sm" data-go="${a.id}">${t("go")}</button></div>
    </article>`;
  }).join("");
}

// ═══════════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════════
grid.addEventListener("click", e => {
  const goBtn = e.target.closest("[data-go]");
  const card = e.target.closest(".act-card");
  if(goBtn){openById(Number(goBtn.dataset.go));e.stopPropagation();}
  else if(card){openById(Number(card.dataset.id));}
});

function openById(id){
  const idx = currentList.findIndex(a => a.id===id);
  if(idx===-1){currentList=A.slice();currentIndex=A.findIndex(a=>a.id===id);}
  else currentIndex=idx;
  openModal();
}

function openModal(){
  const a = currentList[currentIndex];
  if(!a) return;

  $("mTitle").textContent = `#${a.id} — ${ta(a,"title")}`;
  $("mTags").innerHTML = tagHTML(a);
  $("mGoal").textContent = ta(a,"goal");
  $("mTip").textContent = "💡 " + ta(a,"tip");
  const needs = ta(a,"needs");
  $("mNeeds").innerHTML = (Array.isArray(needs)?needs:a.needs).map(n => `<li>${esc(n)}</li>`).join("");

  // Render visual blocks if blockTree exists, else fall back to text steps
  if(a.blockTree){
    $("mBlocks").innerHTML = renderBlocks(a.blockTree);
  } else {
    const blocks = ta(a,"blocks");
    $("mBlocks").innerHTML = (Array.isArray(blocks)?blocks:a.blocks).map((b,i) => `<div class="block-step"><span class="step-num">${i+1}</span>${esc(b)}</div>`).join("");
  }

  updateCode(a);

  const challenges = taChal(a);
  $("mChallenges").innerHTML = challenges.map((c,ci) => `<div class="challenge" style="--ci:${ci}"><span class="challenge-icon">${c.d===1?'🟢':c.d===2?'🟡':'🔴'}</span><div><div class="challenge-text">${c.t}</div><div class="diff-star">${'⭐'.repeat(c.d)}</div></div></div>`).join("");

  const done = !!progress.done[a.id];
  const fav = !!progress.fav[a.id];
  $("markDoneBtn").textContent = done ? t("unmarkDone") : t("markDone");
  $("markFavBtn").textContent = fav ? t("unmarkFav") : t("markFav");
  $("prevBtn").disabled = currentIndex<=0;
  $("nextBtn").disabled = currentIndex>=currentList.length-1;
  switchTab("info");
  overlay.classList.add("open");
  $("closeBtn").focus();
}

function updateCode(a){
  $("codeBlockJS").textContent = a.codeJS;
  $("codeBlockPY").innerHTML = highlightPython(a.codePY);
  const pyTipText = lang==="ar"?"💡 افتح <strong>MakeCode</strong> ← انتقل إلى <strong>Python</strong> ← الصق الكود":lang==="en"?"💡 Open <strong>MakeCode</strong> → switch to <strong>Python</strong> → paste the code":"💡 Ouvre <strong>MakeCode</strong> → passe en <strong>Python</strong> → colle le code";
  $("codeTipPY").innerHTML = pyTipText;
}

function closeModal(){
  overlay.classList.remove("open");
  const card = document.querySelector(`.act-card[data-id="${currentList[currentIndex]?.id}"]`);
  if(card) card.focus();
}
// Focus trap: keep Tab inside modal
overlay.addEventListener("keydown", function(e){
  if(e.key!=="Tab"||!overlay.classList.contains("open")) return;
  const f = overlay.querySelectorAll("button:not(:disabled),[tabindex]:not([tabindex='-1']),a[href],input,select");
  if(!f.length) return;
  const first=f[0], last=f[f.length-1];
  if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus();}}
  else{if(document.activeElement===last){e.preventDefault();first.focus();}}
});
function switchTab(name){
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab===name));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id==="tab-"+name));
}

// ═══════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg){
  $("toastMsg").textContent = msg;
  $("toast").style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $("toast").style.display = "none", 1500);
}

// ═══════════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════════
["searchInput","partSelect","diffSelect","statusSelect","onlyV2","onlyIA"].forEach(id => {
  $(id).addEventListener("input", render);
  $(id).addEventListener("change", render);
});

$("resetBtn").addEventListener("click", () => {
  if(confirm(t("resetConfirm"))){progress=defaultP();saveP(progress);render();showToast(t("resetDone"));}
});
$("randomBtn").addEventListener("click", () => {
  if(currentList.length>0){currentIndex=Math.floor(Math.random()*currentList.length);openModal();}
});

$("closeBtn").addEventListener("click", closeModal);
overlay.addEventListener("click", e => {if(e.target===overlay) closeModal();});
document.addEventListener("keydown", e => {
  if(!overlay.classList.contains("open")) return;
  if(e.key==="Escape") closeModal();
  if(e.key==="ArrowLeft" && currentIndex>0){currentIndex--;openModal();}
  if(e.key==="ArrowRight" && currentIndex<currentList.length-1){currentIndex++;openModal();}
});

$("markDoneBtn").addEventListener("click", () => {
  const a=currentList[currentIndex];if(!a)return;
  if(progress.done[a.id])delete progress.done[a.id];else progress.done[a.id]=true;
  saveP(progress);render();openModal();
});
$("markFavBtn").addEventListener("click", () => {
  const a=currentList[currentIndex];if(!a)return;
  if(progress.fav[a.id])delete progress.fav[a.id];else progress.fav[a.id]=true;
  saveP(progress);render();openModal();
});
$("prevBtn").addEventListener("click", () => {if(currentIndex>0){currentIndex--;openModal();}});
$("nextBtn").addEventListener("click", () => {if(currentIndex<currentList.length-1){currentIndex++;openModal();}});
$("tabBar").addEventListener("click", e => {const btn=e.target.closest(".tab-btn");if(btn) switchTab(btn.dataset.tab);});
$("copyJSBtn").addEventListener("click", async () => {
  try{
    await navigator.clipboard.writeText($("codeBlockJS").textContent);
    $("copyJSBtn").textContent = "✅";
    showToast(t("copied"));
    setTimeout(() => $("copyJSBtn").textContent = "📋", 2000);
  }catch{showToast("Error");}
});
$("copyPYBtn").addEventListener("click", async () => {
  try{
    await navigator.clipboard.writeText($("codeBlockPY").textContent);
    $("copyPYBtn").textContent = "✅";
    showToast(t("copied"));
    setTimeout(() => $("copyPYBtn").textContent = "📋", 2000);
  }catch{showToast("Error");}
});
$("themeSelect").addEventListener("change", e => {document.documentElement.dataset.theme=e.target.value;});
$("langSelect").addEventListener("change", e => {lang=e.target.value;applyLang();});

// ═══════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════
$("sidebar").addEventListener("click", e => {
  const item = e.target.closest(".sidebar-item");
  if(!item) return;
  currentTopic = item.dataset.topic;
  $("sidebar").querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
  item.classList.add("active");
  render();
  // Close drawer on mobile
  $("sidebar").classList.remove("open");
  $("sidebarOverlay").classList.remove("open");
});

function updateSidebarCounts(){
  const countFor = key => {
    if(key==="all") return A.length;
    return TOPICS[key] ? TOPICS[key].ids.length : 0;
  };
  $("sbAllC").textContent = countFor("all");
  Object.keys(TOPICS).forEach(k => {
    const el = $("sb" + k.charAt(0).toUpperCase() + k.slice(1) + "C");
    if(el) el.textContent = countFor(k);
  });
}

// Mobile sidebar toggle
$("sidebarToggle").addEventListener("click", () => {
  $("sidebar").classList.toggle("open");
  $("sidebarOverlay").classList.toggle("open");
});
$("sidebarOverlay").addEventListener("click", () => {
  $("sidebar").classList.remove("open");
  $("sidebarOverlay").classList.remove("open");
});

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
$("logoWrap").innerHTML = LOGO_SVG;
updateSidebarCounts();
applyLang();
</script>
</body>
</html>
